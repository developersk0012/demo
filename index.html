<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>SK Education – Loading</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: linear-gradient(160deg, #0d47a1 0%, #1a73e8 50%, #42a5f5 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: 'Poppins', sans-serif;
  }
  .box { text-align: center; color: #fff; }
  .logo {
    width: 84px; height: 84px; border-radius: 50%;
    background: rgba(255,255,255,.2); border: 3px solid rgba(255,255,255,.5);
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; font-weight: 900; margin: 0 auto 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,.2);
  }
  h2 { font-size: 22px; font-weight: 800; }
  p { font-size: 13px; opacity: .75; margin-top: 6px; }
  .dots { margin-top: 20px; }
  .dot {
    display: inline-block; width: 9px; height: 9px;
    background: rgba(255,255,255,.8); border-radius: 50%; margin: 0 4px;
    animation: bounce .9s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: .18s; }
  .dot:nth-child(3) { animation-delay: .36s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: .6; }
    40% { transform: translateY(-10px); opacity: 1; }
  }
</style>
</head>
<body>
<div class="box">
  <div class="logo">SK</div>
  <h2>SK Education</h2>
  <p>Swami Vivekanand Study Point</p>
  <div class="dots">
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
  </div>
</div>

<script>
  // Smart entry point:
  // logged in user  → dashboard.html
  // admin           → admin.html
  // new/logged out  → signup.html
  (function() {
    var saved = localStorage.getItem('sk_user');
    if (!saved) { window.location.replace('signup.html'); return; }
    try {
      var u = JSON.parse(saved);
      if (u && u.isAdmin) window.location.replace('admin.html');
      else if (u && u.uid)  window.location.replace('dashboard.html');
      else window.location.replace('signup.html');
    } catch(e) {
      localStorage.removeItem('sk_user');
      window.location.replace('signup.html');
    }
  })();
</script>
</body>
</html>
