<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Sign Up – SK Education</title>
<link rel="stylesheet" href="style.css">
<style>
body { min-height:100vh; background:linear-gradient(160deg,#0d47a1 0%,#1a73e8 45%,#42a5f5 100%); display:flex; align-items:center; justify-content:center; padding:20px; }
.auth-wrap { width:100%; max-width:420px; }
.auth-card { background:#fff; border-radius:24px; padding:30px 26px 26px; box-shadow:0 24px 60px rgba(0,0,0,.28); animation:fadeIn .4s ease; }
[data-theme="dark"] .auth-card { background:#161b22; }
.brand { text-align:center; margin-bottom:22px; }
.brand-name { font-family:'Baloo 2',sans-serif; font-size:20px; font-weight:800; color:#1a73e8; margin-top:8px; }
.brand-tag { font-size:11.5px; color:#6b7280; margin-top:2px; }
.auth-heading { font-size:18px; font-weight:700; margin-bottom:18px; }
.divider { text-align:center; font-size:12px; color:#6b7280; margin:14px 0; position:relative; }
.divider::before,.divider::after { content:''; position:absolute; top:50%; width:38%; height:1px; background:#e5e7eb; }
.divider::before { left:0; } .divider::after { right:0; }
.login-link { text-align:center; margin-top:14px; font-size:13px; color:#6b7280; }
.login-link a { color:#1a73e8; font-weight:700; cursor:pointer; }
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="brand">
      <div class="sk-logo lg" id="main-logo" style="margin:0 auto">SK</div>
      <div class="brand-name">SK Education</div>
      <div class="brand-tag">Swami Vivekanand Study Point • Direction to Success</div>
    </div>
    <div class="auth-heading">Create Account 🎓</div>
    <div class="alert alert-error" id="err-box"></div>
    <div class="form-group">
      <label>Full Name</label>
      <input class="form-input" id="f-name" type="text" placeholder="Enter your full name" autocomplete="name">
    </div>
    <div class="form-group">
      <label>Mobile Number</label>
      <input class="form-input" id="f-phone" type="tel" placeholder="10-digit mobile number" maxlength="10">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input class="form-input" id="f-email" type="email" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input class="form-input" id="f-pass" type="password" placeholder="Min. 6 characters">
    </div>
    <button class="btn btn-primary" id="signup-btn" onclick="doSignup()">Sign Up Free</button>
    <div class="login-link">Already have account? <a href="login.html">Login here</a></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="shared.js"></script>
<script>
applyTheme();
// If already logged in, redirect
window.addEventListener('DOMContentLoaded', () => {
  const u = getUser();
  if (u) { window.location.href = u.isAdmin ? 'admin.html' : 'dashboard.html'; }
  loadLogo(document.getElementById('main-logo'));
});

async function doSignup() {
  const name = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const email = document.getElementById('f-email').value.trim().toLowerCase();
  const pass = document.getElementById('f-pass').value;
  const errBox = document.getElementById('err-box');
  const btn = document.getElementById('signup-btn');
  errBox.style.display = 'none';

  if (!name) return showErr('Name is required');
  if (phone.length < 10 || !/^\d+$/.test(phone)) return showErr('Enter valid 10-digit mobile number');
  if (!email || !email.includes('@')) return showErr('Enter valid email address');
  if (pass.length < 6) return showErr('Password must be at least 6 characters');

  btn.textContent = 'Creating account...'; btn.disabled = true;

  try {
    const existing = await fbGet('users');
    if (existing) {
      for (const k of Object.keys(existing)) {
        if (existing[k].phone === phone) return showErr('Account already exists with this mobile. Please login.');
        if (existing[k].email === email) return showErr('Account already exists with this email. Please login.');
      }
    }
    const uid = 'u_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    const userData = {
      uid, name, phone, email,
      password: btoa(pass),
      class: '10',
      joinDate: new Date().toISOString(),
      courses: ['dream465']
    };
    await fbSet(`users/${uid}`, userData);
    setUser(userData);
    generateIDCard(userData);
    showToast('Welcome ' + name + '! 🎉 Your ID card is downloading...');
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
  } catch(e) {
    showErr('Something went wrong. Check internet & try again.');
    btn.textContent = 'Sign Up Free'; btn.disabled = false;
  }

  function showErr(msg) {
    errBox.textContent = msg; errBox.style.display = 'block';
    btn.textContent = 'Sign Up Free'; btn.disabled = false;
  }
}
</script>
<div class="toast-wrap"><div class="toast" id="sk-toast"></div></div>
</body>
</html>
